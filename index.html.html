<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon Networking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --paper:#FAF8F3; --surface:#FFFFFF; --surface-2:#F2EEE5; --column:#F4F0E7;
  --ink:#211F1A; --ink-soft:#524E45; --muted:#8C867A; --faint:#B6AFA1;
  --line:#E6E0D4; --line-soft:#EFEADF;
  --accent:#1C6E63; --accent-soft:#E4EEEB;
  --danger:#A8453C; --danger-soft:#F3E3E1;
  --nav:#2f5f9f; --nav-soft:#c2cdde; --nav-accent:#ba0d2e;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(33,31,26,.05),0 6px 20px rgba(33,31,26,.05);
  --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font);font-size:15px}
button,input,select,textarea{font:inherit}
button{cursor:pointer;border:0;background:none;color:inherit}
a{color:var(--accent);text-decoration:none;font-weight:650}
#root{display:flex;min-height:100vh}
.sidebar{width:214px;flex:0 0 214px;background:var(--nav);color:var(--nav-soft);height:100vh;position:sticky;top:0;padding:18px 10px;overflow-y:auto}
.nav-brand{padding:4px 6px 20px}
.nav-brand h1{margin:0;color:#fff;font-size:21px;letter-spacing:-.02em}
.nav-brand p{margin:5px 0 0;color:#8295b2;font-size:12px;line-height:1.35}
.nav-item{width:100%;text-align:left;padding:10px 13px;border-radius:10px;margin:2px 0;color:#c2cdde;font-size:14px;font-weight:650;position:relative}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.on{background:rgba(255,255,255,.09);color:#fff}
.nav-item.on:before{content:"";position:absolute;left:-10px;top:7px;bottom:7px;width:4px;border-radius:0 4px 4px 0;background:var(--nav-accent)}
.main{flex:1;min-width:0}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--paper);position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:baseline;gap:10px;min-width:max-content}
.brand h2{margin:0;font-size:19px}
.count{font-size:13px;color:var(--muted);font-weight:550}
.search{flex:1;max-width:420px}
.search input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);outline:none}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;background:var(--ink);color:#fff;border-radius:var(--radius-sm);font-weight:650;font-size:14px;white-space:nowrap}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border:1px solid var(--line);border-radius:var(--radius-sm);font-weight:650;font-size:13.5px;background:var(--surface);white-space:nowrap}
.btn-danger{display:inline-flex;align-items:center;padding:8px 13px;border-radius:var(--radius-sm);font-weight:650;font-size:13.5px;background:var(--danger-soft);color:var(--danger);white-space:nowrap}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 24px;border-bottom:1px solid var(--line-soft)}
.chip{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;font-weight:650;color:var(--ink-soft);background:var(--surface)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.content{padding:16px 24px 40px}
.list{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.row{display:grid;grid-template-columns:1.45fr 1fr .9fr .8fr 1.05fr 1.15fr;gap:14px;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.row.people{grid-template-columns:1.25fr 1fr .9fr 1.15fr 1fr 1fr 1fr .7fr}
.row:last-child{border-bottom:0}
.row:hover{background:var(--surface-2)}
.row.head{cursor:default;background:transparent;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}
.row.head:hover{background:transparent}
.nm{font-weight:700}
.sub{font-size:13px;color:var(--muted);margin-top:2px}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700;background:var(--surface-2);color:var(--ink-soft);white-space:nowrap}
.pill.green{background:#E4EEEB;color:#1C6E63}
.pill.blue{background:#EAF1F8;color:#2F66A8}
.pill.red{background:#F3E3E1;color:#A8453C}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{margin:0 0 12px;font-size:17px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 24px;color:var(--muted)}
.empty h3{margin:0 0 6px;color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.kpi .num{font-size:30px;font-weight:750;letter-spacing:-.02em}
.kpi .lbl{font-size:13px;color:var(--muted);font-weight:650;margin-top:5px}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(33,31,26,.32);z-index:40}
.drawer{position:fixed;top:0;right:0;height:100%;width:650px;max-width:100%;background:var(--paper);z-index:50;box-shadow:-10px 0 40px rgba(33,31,26,.14);transform:translateX(100%);transition:transform .22s;display:flex;flex-direction:column}
.drawer-bg.show{display:block}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:20px 22px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.drawer-head h2{font-size:21px;margin:0 0 3px}
.drawer-body{flex:1;overflow:auto;padding:18px 22px}
.drawer-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px}
.defgrid{display:grid;grid-template-columns:140px 1fr;gap:9px 16px;font-size:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:16px}
.defgrid dt{color:var(--muted);font-size:12.5px}
.defgrid dd{margin:0;word-break:break-word}
.subtabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.subtabs button{padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;font-weight:650;background:var(--surface)}
.subtabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.subtab{display:none}
.subtab.on{display:block}
.task{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.task.done{opacity:.55;text-decoration:line-through}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(33,31,26,.32);z-index:70;align-items:flex-start;justify-content:center;padding:36px 18px;overflow:auto}
.modal-bg.show{display:flex}
.modal{background:var(--paper);width:100%;max-width:960px;border-radius:16px;box-shadow:0 20px 60px rgba(33,31,26,.25);overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h2{margin:0;font-size:18px}
.modal-body{padding:18px 24px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 24px;border-top:1px solid var(--line)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);outline:none}
.fg textarea{min-height:90px;resize:vertical}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.map-grid{display:grid;grid-template-columns:230px 1fr;gap:10px 14px;align-items:center}
.map-grid label{font-size:13px;color:var(--ink-soft);font-weight:650}
.map-grid select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface)}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.preview-table th,.preview-table td{border-bottom:1px solid var(--line-soft);padding:8px;text-align:left;vertical-align:top}
.preview-table th{font-size:11px;text-transform:uppercase;color:var(--muted)}
.notice{background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.45;margin-bottom:14px}
.warn{background:#FFF7E6;color:#9a6a12;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.45;margin-bottom:14px}
@media(max-width:760px){
  #root{display:block}
  .sidebar{position:static;width:100%;height:auto;display:flex;gap:4px;overflow:auto;padding:8px}
  .nav-brand{display:none}
  .nav-item{width:auto;white-space:nowrap}
  .nav-item.on:before{display:none}
  .topbar{flex-wrap:wrap}
  .search{order:3;max-width:none;flex-basis:100%}
  .row,.row.people{grid-template-columns:1.25fr 1fr .9fr 1.15fr 1fr 1fr 1fr .7fr}
  .hide-sm{display:none}
  .kpis,.grid{grid-template-columns:1fr}
}

.stats-wrap{display:flex;justify-content:center;align-items:center;padding:28px 12px;}
.stats-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;width:min(900px,100%);}

.pie-layout{display:flex;gap:28px;align-items:center;justify-content:center;flex-wrap:wrap;}

<script>
// OUTLOOK_SCHEDULER_FIXED_V2
const LS_KEY = "simon_recruiting_crm_v5";
const SUPABASE_URL = "https://alaojtlxeoohtqkmkzhm.supabase.co";
const SUPABASE_KEY = "sb_publishable_dqh6ndEYPZ71J8DR4KofPw_PMH3WQtt";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_STATE = {
  companies: [],
  people: [],
  tasks: [],
  cadence: [],
  templates: [
    {name:"LinkedIn Connect", body:"Hi {{FirstName}}, I came across your profile and saw your experience at {{Company}}. I am interested in learning more about the industry and would be grateful to connect."},
    {name:"Intro Email", body:"Hi {{FirstName}},\\n\\nI hope you're doing well. My name is {{Your Name}}, and I am interested in learning more about {{Company}} and your experience there. Would you be open to a quick 15-minute call sometime next week?\\n\\nBest,\\n{{Your Name}}"},
    {name:"Follow-Up", body:"Hi {{FirstName}},\\n\\nI wanted to follow up on my note in case it got buried. I would really appreciate the chance to briefly connect and learn more about your experience at {{Company}}.\\n\\nBest,\\n{{Your Name}}"},
    {name:"Thank You", body:"Hi {{FirstName}},\\n\\nThank you again for taking the time to speak with me. I really enjoyed learning about your experience at {{Company}} and appreciate the advice you shared.\\n\\nBest,\\n{{Your Name}}"}
  ]
};

let state = JSON.parse(localStorage.getItem(LS_KEY) || "null") || DEFAULT_STATE;
let cloudSaveTimer = null;
let cloudReady = false;
let isLoadingCloud = false;

let currentPage = "companies";
let currentFilter = "";
let importedRows = [];
let importedHeaders = [];
let headerIndex = 0;

const pages = {
  companies: {title:"Companies", newLabel:"New company"},
  people: {title:"People", newLabel:"New person"},
  tasks: {title:"Tasks", newLabel:"New task"},
  cadence: {title:"Cadence", newLabel:"New cadence"},
  templates: {title:"Templates", newLabel:"New template"},
  dashboard: {title:"Statistics", newLabel:"Add target"}
};



function repairCloudData(){
  if(!state || typeof state !== "object") state = DEFAULT_STATE;
  if(!Array.isArray(state.people)) state.people = [];
  if(!Array.isArray(state.tasks)) state.tasks = [];
  if(!Array.isArray(state.cadence)) state.cadence = [];
  if(!Array.isArray(state.templates)) state.templates = DEFAULT_STATE.templates;

  // If companies are missing but people have company names, rebuild the Companies tab from People.
  if(!Array.isArray(state.companies) || state.companies.length === 0){
    const names = [...new Set(state.people.map(p => String(p.company || "").trim()).filter(Boolean))];
    state.companies = names.map(name => ({
      id: id(),
      name,
      status: "Researching Company",
      priority: "Medium",
      industry: "",
      location: "",
      website: "",
      notes: "Auto-created from people records during cloud sync repair."
    }));
  }

  // Normalize old imported people statuses so they show correctly in the new dropdowns.
  state.people.forEach(p => {
    if(!["Have not sent email","Sent email","Heard back","Call scheduled","Have not heard back"].includes(p.status)){
      p.status = "Have not sent email";
    }
    if(!Array.isArray(p.emails)){
      p.emails = p.email ? [p.email] : [];
    }
    p.connection = normalizeConnectionStatus ? normalizeConnectionStatus(p.connection) : (p.connection || "Have not sent");
  });

  // Normalize old company statuses so the Companies tab displays correctly.
  state.companies.forEach(c => {
    if(!["Researching Company","Sent Emails"].includes(c.status)){
      c.status = "Researching Company";
    }
  });
}

function setSyncStatus(text){
  const el = document.getElementById("syncStatus");
  if(el) el.textContent = text;
}

function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  scheduleCloudSave();
}

function scheduleCloudSave(){
  if(!cloudReady || isLoadingCloud) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(saveToCloud, 450);
}

async function loadFromCloud(){
  isLoadingCloud = true;
  setSyncStatus("Cloud sync loading...");
  try{
    const { data, error } = await sb
      .from("crm_data")
      .select("data")
      .eq("id", 1)
      .single();

    if(error) throw error;

    if(data && data.data && Object.keys(data.data).length){
      state = data.data;
      repairCloudData();
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    } else {
      // If Supabase is empty but this browser has your old CRM data,
      // upload the local data to Supabase once.
      const localState = JSON.parse(localStorage.getItem(LS_KEY) || "null");
      if(localState && (
        (localState.companies && localState.companies.length) ||
        (localState.people && localState.people.length) ||
        (localState.tasks && localState.tasks.length)
      )){
        state = localState;
      }
      repairCloudData();
      cloudReady = true;
      await saveToCloud(true);
    }

    cloudReady = true;
    setSyncStatus("Cloud synced");
  } catch(err){
    console.error("Supabase load error:", err);
    cloudReady = false;
    setSyncStatus("Cloud sync not connected");
    console.warn("Cloud sync could not load. App will keep using local browser data until Supabase is fixed.");
  } finally {
    isLoadingCloud = false;
    render();
    setTimeout(refreshStatusColors,0);
  }
}

async function saveToCloud(initial=false){
  try{
    setSyncStatus("Saving...");
    const payload = { id: 1, data: state, updated_at: new Date().toISOString() };

    const { error } = await sb
      .from("crm_data")
      .upsert(payload, { onConflict: "id" });

    if(error) throw error;
    setSyncStatus("Cloud synced");
  } catch(err){
    console.error("Supabase save error:", err);
    setSyncStatus("Cloud save not connected");
    console.warn("Cloud save failed. Local browser data is still available.");
  }
}


async function clearLocalAndForceCloud(){
  localStorage.removeItem(LS_KEY);
  state = DEFAULT_STATE;
  await loadFromCloud();
  alert("Fresh cloud data loaded. If companies still do not show, the cloud data itself is missing companies.");
}

async function forceCloudRefresh(){
  await loadFromCloud();
}

/* ---------------- Drag / Multi Select ---------------- */
let dragSelecting=false;
let dragSelectMode=true;
let dragSelectType="";

function activeSelectionSet(type){
  if(type==="company") return selectedCompanies;
  if(type==="person") return selectedPeopleForCadence;
  return null;
}
function beginDragSelect(event,type,itemId){
  if(event.target.closest("button,select,a,input,textarea")) return;
  const set=activeSelectionSet(type);
  if(!set) return;
  dragSelecting=true;
  dragSelectType=type;
  dragSelectMode=!set.has(itemId);
  applyDragSelection(type,itemId,dragSelectMode);
  event.preventDefault();
}
function enterDragSelect(type,itemId){
  if(!dragSelecting||dragSelectType!==type) return;
  applyDragSelection(type,itemId,dragSelectMode);
}
function endDragSelect(){
  dragSelecting=false;
  dragSelectType="";
}
function applyDragSelection(type,itemId,shouldSelect){
  const set=activeSelectionSet(type);
  if(!set) return;
  if(shouldSelect) set.add(itemId); else set.delete(itemId);
  const row=document.querySelector(`[data-select-type="${type}"][data-select-id="${CSS.escape(itemId)}"]`);
  if(row){
    row.classList.toggle("drag-selected",shouldSelect);
    const box=row.querySelector(".row-select-box");
    if(box) box.checked=shouldSelect;
  }
  updateSelectionCounts();
}
function updateSelectionCounts(){
  const c=document.getElementById("companySelectionCount");
  const p=document.getElementById("personSelectionCount");
  if(c) c.textContent=`${selectedCompanies.size} selected`;
  if(p) p.textContent=`${selectedPeopleForCadence.size} selected`;

/* ---------------- Cadence Steps Automatically Show Under Tasks ---------------- */

function ensureCadenceTaskFields(){
  if(!state.cadenceTemplates) state.cadenceTemplates = [];
  state.people.forEach(p => {
    if(!Array.isArray(p.completedCadenceSteps)) p.completedCadenceSteps = [];
    if(!Array.isArray(p.cadenceTaskStatuses)) p.cadenceTaskStatuses = [];
  });
}

function cadenceStepTaskId(person, cadence, step, idx){
  return `cadence_${person.id}_${cadence.id}_${person.cadenceStartDate || today()}_${idx}_${step.day}`;
}

function cadenceStepDueDate(person, step){
  const start = new Date((person.cadenceStartDate || today()) + "T00:00:00");
  const due = new Date(start);
  due.setDate(start.getDate() + Number(step.day || 0));
  return due.toISOString().slice(0,10);
}

function getCadenceTaskStatus(person, taskId){
  if((person.completedCadenceSteps || []).includes(taskId)) return "Complete";
  const saved = (person.cadenceTaskStatuses || []).find(x => x.id === taskId);
  return normalizeTaskStatus(saved?.status || "New Task");
}

function setCadenceTaskStatus(personId, taskId, status){
  const p = state.people.find(x => x.id === personId);
  if(!p) return;
  if(!Array.isArray(p.cadenceTaskStatuses)) p.cadenceTaskStatuses = [];
  if(!Array.isArray(p.completedCadenceSteps)) p.completedCadenceSteps = [];

  p.cadenceTaskStatuses = p.cadenceTaskStatuses.filter(x => x.id !== taskId);
  p.cadenceTaskStatuses.push({id: taskId, status: normalizeTaskStatus(status)});

  if(normalizeTaskStatus(status) === "Complete"){
    if(!p.completedCadenceSteps.includes(taskId)) p.completedCadenceSteps.push(taskId);
  } else {
    p.completedCadenceSteps = p.completedCadenceSteps.filter(x => x !== taskId);
  }

  save();
  render();
setTimeout(refreshStatusColors,0);
}


function editCadenceTask(personId, taskId){
  const task = getCadenceGeneratedTasks().find(t => t.id === taskId && t.personId === personId);
  if(!task) return;
  const person = state.people.find(p => p.id === personId);
  if(person) openPerson(person.id);
}

function deleteCadenceTask(personId, taskId){
  const p = state.people.find(x => x.id === personId);
  if(!p) return;
  if(!Array.isArray(p.cadenceTaskStatuses)) p.cadenceTaskStatuses = [];
  if(!Array.isArray(p.completedCadenceSteps)) p.completedCadenceSteps = [];

  p.cadenceTaskStatuses = p.cadenceTaskStatuses.filter(x => x.id !== taskId);
  p.completedCadenceSteps = p.completedCadenceSteps.filter(x => x !== taskId);
  p.cadenceTaskStatuses.push({id: taskId, status: "Hidden"});

  save();
  render();
setTimeout(refreshStatusColors,0);
}

function getCadenceGeneratedTasks(){
  ensureCadenceTemplates();
  ensureCadenceTaskFields();

  const tasks = [];

  state.people.forEach(person => {
    if(!person.cadenceId) return;

    const cadence = cadenceById(person.cadenceId);
    if(!cadence || !Array.isArray(cadence.steps)) return;

    const steps = [...cadence.steps].sort((a,b)=>Number(a.day || 0) - Number(b.day || 0));

    steps.forEach((step, idx) => {
      const taskId = cadenceStepTaskId(person, cadence, step, idx);
      const saved = (person.cadenceTaskStatuses || []).find(x => x.id === taskId);
      if(saved?.status === "Hidden") return;

      const templateName = step.template || step.action || "";
      tasks.push({
        id: taskId,
        source: "cadence",
        personId: person.id,
        person: person.name || "",
        company: person.company || "",
        type: step.action || templateName || "Cadence Step",
        template: templateName,
        due: cadenceStepDueDate(person, step),
        status: getCadenceTaskStatus(person, taskId),
        notes: `${cadence.name || "Cadence"}${templateName ? " • " + templateName : ""}`
      });
    });
  });

  return tasks;
}

function updateCadenceTaskStatus(personId, taskId, newStatus){
  setCadenceTaskStatus(personId, taskId, newStatus);
}

function runCadenceTask(personId, taskId){
  const task = getCadenceGeneratedTasks().find(t => t.id === taskId && t.personId === personId);
  const person = state.people.find(p => p.id === personId);
  if(!task || !person) return;

  const action = String(task.type || "").toLowerCase();

  if(action.includes("linkedin")){
    openLinkedInWithNote(person.id);
    return;
  }

  if(action.includes("email") || action.includes("follow") || action.includes("thank")){
    chooseEmailForPerson(person.id, task.template || task.type || "Intro Email");
    return;
  }

  openPerson(person.id);
}

function peopleStatusStats(){
  const categories = [
    {label:"Have not sent email", color:"#e5e7eb", text:"#374151"},
    {label:"Sent email", color:"#fbcfe8", text:"#9d174d"},
    {label:"Heard back", color:"#e9d5ff", text:"#6b21a8"},
    {label:"Call scheduled", color:"#dcfce7", text:"#166534"},
    {label:"Have not heard back", color:"#fed7aa", text:"#9a3412"}
  ];

  const total = state.people.length || 0;
  return categories.map(cat => {
    const count = state.people.filter(p => normalizePeopleStatus(p.status) === cat.label).length;
    const pct = total ? (count / total * 100) : 0;
    return {...cat, count, pct};
  });
}

function polarToCartesian(cx, cy, r, angleDeg){
  const angleRad = (angleDeg - 90) * Math.PI / 180.0;
  return {x: cx + (r * Math.cos(angleRad)), y: cy + (r * Math.sin(angleRad))};
}

function pieSlicePath(cx, cy, r, startAngle, endAngle){
  const start = polarToCartesian(cx, cy, r, endAngle);
  const end = polarToCartesian(cx, cy, r, startAngle);
  const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
  return ["M", cx, cy, "L", start.x, start.y, "A", r, r, 0, largeArcFlag, 0, end.x, end.y, "Z"].join(" ");
}

function renderStatusPieChart(){
  const stats = peopleStatusStats();
  const total = state.people.length || 0;

  if(!total){
    return `<div class="empty"><h3>No people yet</h3><p>Import or add contacts to see the status breakdown.</p></div>`;
  }

  let angle = 0;
  const slices = stats.map(s => {
    const sweep = s.pct * 3.6;
    const path = pieSlicePath(180, 180, 150, angle, angle + sweep);
    const mid = angle + sweep / 2;
    const labelPoint = polarToCartesian(180, 180, 92, mid);
    angle += sweep;
    return `
      <path d="${path}" fill="${s.color}" stroke="#ffffff" stroke-width="3"></path>
      ${s.pct >= 5 ? `<text x="${labelPoint.x}" y="${labelPoint.y}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="${s.text}">${s.pct.toFixed(0)}%</text>` : ""}
    `;
  }).join("");

  const legend = stats.map(s => `
    <div class="legend-row">
      <div class="legend-left">
        <span class="legend-swatch" style="background:${s.color}"></span>
        <span>${esc(s.label)}</span>
      </div>
      <span>${s.pct.toFixed(1)}% (${s.count})</span>
    </div>
  `).join("");

  return `
    <div class="stats-wrap">
      <div class="stats-card">
        <h3>People status breakdown</h3>
        <div class="sub">Percentages are based on all ${total} people and add up to 100%.</div>
        <div class="pie-layout">
          <svg class="pie-svg" viewBox="0 0 360 360" role="img" aria-label="People status pie chart">
            ${slices}
            <circle cx="180" cy="180" r="58" fill="var(--surface)"></circle>
            <text x="180" y="172" text-anchor="middle" font-size="26" font-weight="850" fill="var(--ink)">${total}</text>
            <text x="180" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="var(--muted)">People</text>
          </svg>
          <div class="pie-legend">${legend}</div>
        </div>
      </div>
    </div>
  `;
}

const SAVED_VERSIONS_KEY = "simon_networking_saved_versions_modal_v1";

function storeSavedVersions(versions){

}

function versionSnapshot(){
  if(typeof repairCloudData === "function") repairCloudData();
  return JSON.parse(JSON.stringify(state));
}

function versionSummaryText(data){
  data = data || {};

  const tasks = Array.isArray(data.tasks) ? data.tasks.length : 0;
  const templates = Array.isArray(data.templates) ? data.templates.length : 0;
  return `${companies} companies • ${people} people • ${tasks} tasks • ${templates} templates`;
}

function versionDateText(dateValue){

function restoreSavedVersionModal(versionId){
  const item = findSavedVersionModal(versionId);
  if(!item) return;

  if(!confirm("Restore this version? Your current CRM will be replaced, but a safety backup will be saved first.")) return;

  const versions = loadSavedVersions();
  versions.unshift({
    id: String(Date.now()),
    name: "Safety backup before restore",
    created_at: new Date().toISOString(),
    data: versionSnapshot()
  });
  storeSavedVersions(versions.slice(0, 75));

  state = JSON.parse(JSON.stringify(item.data || DEFAULT_STATE));
  if(typeof repairCloudData === "function") repairCloudData();

  localStorage.setItem(LS_KEY, JSON.stringify(state));
  save();

  closeModal();
  currentPage = "companies";
  render();
  setTimeout(refreshStatusColors, 0);
  alert("Version restored.");

function duplicateSavedVersion(versionId){
  const item = findSavedVersionModal(versionId);
  if(!item) return;

  const versions = loadSavedVersions();
  versions.unshift({
    id: String(Date.now()),
    name: (item.name || "Saved version") + " copy",
    created_at: new Date().toISOString(),
    data: JSON.parse(JSON.stringify(item.data || DEFAULT_STATE))
  });
  storeSavedVersions(versions.slice(0, 75));
  openVersionsModal();
}

function deleteSavedVersionModal(versionId){
  if(!confirm("Delete this saved version?")) return;
  const versions = loadSavedVersions().filter(item => String(item.id) !== String(versionId));
  storeSavedVersions(versions);
  openVersionsModal();
}

function exportSavedVersions(){
  const blob = new Blob([JSON.stringify(loadSavedVersions(), null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "simon-networking-saved-versions.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

  openModal("Import Saved Versions", `
    <div class="notice">Import versions that you previously exported from this app.</div>
    <div class="fg">
      <label>Saved versions file</label>
      <input type="file" id="saved_versions_file" accept=".json">

  `, `
    <button class="btn-ghost" onclick="openVersionsModal()">Back</button>
    <button class="btn-primary" onclick="importSavedVersions()">Import</button>
  `);
}

function importSavedVersions(){
  const fileInput = document.getElementById("saved_versions_file");
  const file = fileInput && fileInput.files ? fileInput.files[0] : null;
  if(!file) return alert("Choose a file first.");

  const reader = new FileReader();
  reader.onload = () => {
    try{
      const incoming = JSON.parse(reader.result);
      if(!Array.isArray(incoming)) throw new Error("Invalid file");

      const existing = loadSavedVersions();
      const merged = [...incoming, ...existing];
      const seen = new Set();
      const cleaned = merged.filter(item => {
        if(!item || !item.id || !item.data) return false;
        const key = String(item.id);
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      }).slice(0, 75);

      storeSavedVersions(cleaned);
      openVersionsModal();
    }catch(e){
      alert("Could not import this file.");
    }
  };
  reader.readAsText(file);
}



/* ---------------- Outlook Calendar Scheduling ---------------- */

function timeToMinutes(t){
  if(!t) return 0;
  const parts = String(t).split(":").map(Number);
  return (parts[0] || 0) * 60 + (parts[1] || 0);
}
function minutesToTime(total){
  const h = Math.floor(total / 60) % 24;
  const m = total % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function defaultEndTime(startTime){
  return minutesToTime(timeToMinutes(startTime || "10:00") + 30);
}
function outlookCalendarUrl({subject, startDate, startTime, endTime, body, location}){
  const base = "https://outlook.office.com/calendar/0/deeplink/compose";
  const params = new URLSearchParams({
    subject: subject || "Networking Call",
    startdt: `${startDate}T${startTime}:00`,
    enddt: `${startDate}T${endTime}:00`,
    body: body || "",
    location: location || ""
  });
  return `${base}?${params.toString()}`;
}

    openTasks: tasks
      .filter(t => normalizeTaskStatus(t.status) !== "Complete")

async function generateCompanyAI(){
  const c = state.companies.find(x => x.id === activeAICompanyId);
  if(!c) return;

  const resultBox = document.getElementById("ai_result");
  const generateBtn = document.getElementById("ai_generate_btn");
  const preset = v("ai_preset") || "interview-prep";
  const customPrompt = v("ai_custom_prompt") || "";

  resultBox.innerHTML = `<span class="ai-loading">Generating…</span>`;
  if(generateBtn) generateBtn.disabled = true;

  try{
    const response = await fetch("/api/company-ai", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        preset,
        customPrompt,
        company:companyAIContext(c)
      })
    });

    const payload = await response.json().catch(() => ({}));
    if(!response.ok){
      throw new Error(payload.error || "AI request failed.");
    }

    latestAIResult = payload.text || "";
    resultBox.innerHTML = `
      <div>${esc(latestAIResult).replaceAll("\n","<br>")}</div>
      <div class="ai-actions">
        <button class="btn-primary" onclick="appendAIToCompanyNotes()">Add to Interview Notes</button>
        <button class="btn-ghost" onclick="navigator.clipboard.writeText(latestAIResult)">Copy</button>
        <button class="btn-ghost" onclick="generateCompanyAI()">Regenerate</button>
      </div>
    `;
  }catch(err){
    console.error("Company AI error:", err);
    resultBox.innerHTML = `
      <div class="warn">

function ensurePersonEmails(person){
  if(!Array.isArray(person.emails)){
    const existing = person.email ? String(person.email).trim() : "";
    person.emails = existing ? [existing] : [];
  }
  return person.emails;
}

function primaryEmail(person){
  const emails = ensurePersonEmails(person);
  return emails[0] || person.email || "";
}

function emailsDisplay(person){
  const emails = ensurePersonEmails(person);
  if(!emails.length) return "";
  return emails.map((email, idx) => `
    <div class="task" style="justify-content:space-between">
      <div>
        <b>${esc(email)}</b>
        ${idx===0 ? `<div class="sub">Primary email</div>` : ""}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-ghost" onclick="event.stopPropagation(); openOutlookForPersonEmail('${person.id}', '${esc(email)}')">Email</button>
        ${idx>0 ? `<button class="btn-ghost" onclick="event.stopPropagation(); makePrimaryEmail('${person.id}', ${idx})">Make primary</button>` : ""}
        <button class="btn-danger" onclick="event.stopPropagation(); deletePersonEmail('${person.id}', ${idx})">Delete</button>
      </div>
    </div>
  `).join("");
}

function addPersonEmail(personId){
  const p = state.people.find(x => x.id === personId);
  if(!p) return;
  const email = prompt("Enter the email address to add:");
  if(!email) return;
  const clean = email.trim();
  if(!clean) return;
  const emails = ensurePersonEmails(p);
  if(emails.some(e => same(e, clean))){
    alert("That email is already saved for this person.");
    return;
  }
  emails.push(clean);
  if(!p.email) p.email = clean;
  save();
  openPerson(personId);
}

function deletePersonEmail(personId, index){
  const p = state.people.find(x => x.id === personId);
  if(!p) return;
  const emails = ensurePersonEmails(p);
  if(index < 0 || index >= emails.length) return;
  if(!confirm("Delete this email?")) return;
  emails.splice(index, 1);
  p.email = emails[0] || "";
  save();
  openPerson(personId);
}

function makePrimaryEmail(personId, index){
  const p = state.people.find(x => x.id === personId);
  if(!p) return;
  const emails = ensurePersonEmails(p);
  if(index <= 0 || index >= emails.length) return;
  const [email] = emails.splice(index, 1);
  emails.unshift(email);
  p.email = email;
  save();
  openPerson(personId);
}




function personForTask(task){
  if(!task) return null;
  return state.people.find(p =>
    (task.person && same(p.name, task.person)) &&
    (!task.company || same(p.company, task.company))
  ) || state.people.find(p => task.person && same(p.name, task.person)) || null;
}

function runManualTask(taskId){
  const t = state.tasks.find(x => x.id === taskId);
  if(!t) return;

  const taskType = String(t.type || "").toLowerCase();
  const person = personForTask(t);

  if(taskType.includes("linkedin")){
    if(person) openLinkedInWithNote(person.id);
    else alert("No matching person found for this LinkedIn task.");
    return;
  }

  if(taskType.includes("email") || taskType.includes("follow") || taskType.includes("thank")){
    if(!person){
      alert("No matching person found for this email task. Make sure the task has the person's exact name.");
      return;
    }
    chooseEmailForPerson(person.id, t.type || "Intro Email");
    return;
  }

  // For non-email tasks, just open the matching person if there is one.
  if(person) openPerson(person.id);
  else alert("This task does not have an email action attached.");
}

function chooseEmailForPerson(personId, purpose="intro"){
  const p = state.people.find(x=>x.id===personId);
  if(!p) return;
  const emails = ensurePersonEmails(p).filter(Boolean);

  if(emails.length <= 1){
    openOutlookForPersonEmail(personId, emails[0] || p.email || "", purpose);
    return;
  }

  openModal("Choose email address", `
    <div class="notice">This person has multiple email addresses. Choose which one you want to send to.</div>
    <div class="fg">
      <label>Email Address</label>
      <select id="chosenPersonEmail">
        ${emails.map(email => `<option value="${esc(email)}">${esc(email)}</option>`).join("")}
      </select>
    </div>
  `, `
    <button class="btn-primary" onclick="openOutlookForPersonEmail('${personId}', document.getElementById('chosenPersonEmail').value, '${esc(purpose)}')">Email with Outlook</button>
  `);
}

function openOutlookForPersonEmail(personId, email, purpose="Intro Email"){
  const p = state.people.find(x=>x.id===personId);
  if(!p) return;

  const type = String(purpose || "Intro Email").toLowerCase();
  let templateName = "Intro Email";
  if(type.includes("follow")) templateName = "Follow-Up";
  if(type.includes("thank")) templateName = "Thank You";
  if(type.includes("linkedin")) templateName = "LinkedIn Connect";

  const templateBody = getEmailTemplateBody(templateName);
  const subject = getEmailSubject(templateName);
  const body = fillTemplate(templateBody, p);
  launchMailto(email || primaryEmail(p), subject, body);
}

function normalizeTaskStatus(status){
  const s = String(status || "").trim().toLowerCase();
  if(["complete","completed","done"].includes(s)) return "Complete";
  if(["active","in progress","doing"].includes(s)) return "Active";
  if(["queued","queue","not started"].includes(s)) return "Queued";
  return "New Task";
}

  importedRows=[]; importedHeaders=[]; headerIndex=0;
  openModal("Import Excel or CSV", `

function readImportFile(){
  const file=document.getElementById("imp_file").files[0];
  if(!file){alert("Choose a file first.");return;}
  if(/\.(xlsx|xls)$/i.test(file.name)){
    const reader=new FileReader();
    reader.onload=e=>{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      let rows=[];
      wb.SheetNames.forEach(s=>{
        const r=XLSX.utils.sheet_to_json(wb.Sheets[s],{header:1,defval:""});
        if(r.length) rows=rows.concat(r);
      });
      setupMapping(rows);
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=e=>setupMapping(parseCSV(e.target.result));
    reader.readAsText(file);
  }
}
function parseCSV(text){
  const rows=[];let row=[],cell="",q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], nx=text[i+1];
    if(ch==='"'&&q&&nx==='"'){cell+='"';i++}
    else if(ch==='"')q=!q;
    else if(ch===","&&!q){row.push(cell);cell=""}
    else if((ch==="\n"||ch==="\r")&&!q){if(cell||row.length){row.push(cell);rows.push(row);row=[];cell=""}}
    else cell+=ch;
  }
  if(cell||row.length){row.push(cell);rows.push(row)}
  return rows.filter(r=>r.some(c=>String(c||"").trim()));
}
function setupMapping(rows){
  importedRows=rows;
  headerIndex=detectHeaderRow(rows);
  importedHeaders=rows[headerIndex].map((h,i)=>String(h||`Column ${i+1}`).trim()||`Column ${i+1}`);

  autoMapAll();

}
function mapSelect(label,key){
  return `<label>${label}</label><select id="map_${key}"><option value="">-- Ignore --</option>${importedHeaders.map((h,i)=>`<option value="${i}">${esc(h)}</option>`).join("")}</select>`;
}
function normalize(s){return String(s||"").toLowerCase().replace(/[\s_\-\/().:#]+/g,"")}
function autoMapAll(){
  const maps={
    company:["company","companyname","firm","firmname","organization","employer","account"],
    website:["companywebsite","website","site","url","companyurl"],
    companyStatus:["companystatus","outreachstatus","status","stage"],
    industry:["industry","sector","vertical"],
    location:["location","city","state","market","headquarters","office"],
    companyNotes:["companynotes","notes","comments"],
    c1Name:["contact1name","contactname1","name1","person1name","personname1","contactone","primarycontact","primarycontactname"],
    c1Email:["contact1email","contactemail1","email1","person1email","personemail1","primaryemail","primarycontactemail"],
    c1Title:["contact1title","contacttitle1","title1","jobtitle1","person1title","primarytitle"],
    c1Linkedin:["contact1linkedin","contactlinkedin1","linkedin1","linkedinurl1","person1linkedin","primarylinkedin"],
    c1Status:["contact1status","contactstatus1","status1","person1status"],
    c1Connection:["contact1connection","connection1","person1connection","linkedinstatus1","linkedinconnection1"],
    c2Name:["contact2name","contactname2","name2","person2name","personname2","contacttwo","secondarycontact","secondarycontactname"],
    c2Email:["contact2email","contactemail2","email2","person2email","personemail2","secondaryemail","secondarycontactemail"],
    c2Title:["contact2title","contacttitle2","title2","jobtitle2","person2title","secondarytitle"],
    c2Linkedin:["contact2linkedin","contactlinkedin2","linkedin2","linkedinurl2","person2linkedin","secondarylinkedin"],
    c2Status:["contact2status","contactstatus2","status2","person2status"],
    c2Connection:["contact2connection","connection2","person2connection","linkedinstatus2","linkedinconnection2"]
  };
  Object.entries(maps).forEach(([key,aliases])=>{
    const idx=importedHeaders.findIndex(h=>aliases.includes(normalize(h)));
    if(idx>=0) document.getElementById("map_"+key).value=idx;
  });
}
function detectHeaderRow(rows){
  let best=0, bestScore=-1;
  const words=["company","firm","website","contact","person","name","title","email","linkedin","phone","status"];
  rows.slice(0,20).forEach((r,i)=>{
    let score=0;
    r.forEach(c=>{
      const s=String(c||"").toLowerCase(), n=normalize(s);
      words.forEach(w=>{if(s.includes(w)||n.includes(w))score++});
      if(s.includes("@")) score-=4;
      if(s.startsWith("http")) score-=2;
    });
    if(score>bestScore){best=i;bestScore=score}
  });
  return best;
}
function getMapped(row,key){
  const el=document.getElementById("map_"+key);
  if(!el||el.value==="") return "";
  return String(row[Number(el.value)]||"").trim();
}
function finishMappedImport(){
  let companiesAdded=0, companiesUpdated=0, contactsAdded=0, contactsSkipped=0;
  importedRows.slice(headerIndex+1).forEach(row=>{
    if(!row.some(c=>String(c||"").trim())) return;
    const company=getMapped(row,"company");
    const website=getMapped(row,"website");
    const industry=getMapped(row,"industry");
    const location=getMapped(row,"location");
    const status=getMapped(row,"companyStatus") || "Researching Company";
    const notes=getMapped(row,"companyNotes");
    if(company){
      let co=state.companies.find(c=>same(c.name,company));
      if(co){
        co.website=website||co.website; co.industry=industry||co.industry; co.location=location||co.location; co.status=status||co.status; co.notes=notes||co.notes;
        companiesUpdated++;
      } else {
        state.companies.push({id:id(),name:company,website,industry,location,status,priority:"Medium",notes});
        companiesAdded++;
      }
    }
    const contacts=[
      {name:getMapped(row,"c1Name"),email:getMapped(row,"c1Email"),title:getMapped(row,"c1Title"),linkedin:getMapped(row,"c1Linkedin"),status:getMapped(row,"c1Status")||"Have not sent email",connection:normalizeConnectionStatus(getMapped(row,"c1Connection"))},
      {name:getMapped(row,"c2Name"),email:getMapped(row,"c2Email"),title:getMapped(row,"c2Title"),linkedin:getMapped(row,"c2Linkedin"),status:getMapped(row,"c2Status")||"Have not sent email",connection:normalizeConnectionStatus(getMapped(row,"c2Connection"))}
    ];
    contacts.forEach(ct=>{
      if(!ct.name && ct.email) ct.name=ct.email.split("@")[0].replace(/[._-]/g," ");
      if(ct.linkedin && !/^https?:\/\//i.test(ct.linkedin) && ct.linkedin.toLowerCase().includes("linkedin")) ct.linkedin="https://"+ct.linkedin;
      const has=ct.name||ct.email||ct.title||ct.linkedin;
      if(!has) return;
      const dup=state.people.some(p=>(ct.email&&same(p.email,ct.email))||(ct.linkedin&&same(p.linkedin,ct.linkedin))||(ct.name&&same(p.name,ct.name)&&same(p.company,company)));
      if(dup){contactsSkipped++;return;}
      state.people.push({id:id(),name:ct.name||ct.email||ct.linkedin||"Unnamed Contact",company,title:ct.title,email:ct.email,emails:ct.email?[ct.email]:[],linkedin:ct.linkedin,status:ct.status,connection:normalizeConnectionStatus(ct.connection),phone:"",notes:""});
      contactsAdded++;
    });
  });
  save(); closeModal(); render();
setTimeout(refreshStatusColors,0);
  alert(`Import complete.\nCompanies added: ${companiesAdded}\nCompanies updated: ${companiesUpdated}\nContacts added: ${contactsAdded}\nContacts skipped as duplicates: ${contactsSkipped}`);
}

    .replaceAll("{{Name}}", firstName)
    .replaceAll("{{name}}", firstName)

    .replaceAll("{{company}}", company)
    .replaceAll("{{Title}}", title)

    .replaceAll("{{Your Name}}", "");

  output = output
    .replace(/^Hi\s+\{\{\s*first\s*name\s*\}\}/i, "Hi " + firstName)
    .replace(/^Hi\s+\{\{\s*firstname\s*\}\}/i, "Hi " + firstName)

  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - start) / (1000 * 60 * 60 * 24));
}

function cadenceCurrentStep(person){
  const cadence = cadenceById(person.cadenceId);
  if(!cadence || !cadence.steps || !cadence.steps.length) return null;

  const elapsed = daysFromToday(person.cadenceStartDate || today());
  const sorted = [...cadence.steps].sort((a,b) => Number(a.day || 0) - Number(b.day || 0));

  let current = sorted[0];
  for(const step of sorted){
    if(Number(step.day || 0) <= elapsed) current = step;
  }
  return current;
}

function cadenceNextDueText(person){
  const cadence = cadenceById(person.cadenceId);
  if(!cadence || !cadence.steps || !cadence.steps.length) return "";
  const step = cadenceCurrentStep(person);
  if(!step) return "";

  const start = new Date((person.cadenceStartDate || today()) + "T00:00:00");
  const due = new Date(start);
  due.setDate(start.getDate() + Number(step.day || 0));
  return `${step.action || "Step"} • Due ${due.toISOString().slice(0,10)}`;
}

function openCadenceBuilder(existingId=""){
  const existing = existingId ? cadenceById(existingId) : null;
  const steps = existing?.steps?.length ? existing.steps : [
    {day:0, action:"Intro Email", template:"Intro Email"},
    {day:3, action:"LinkedIn Connect", template:"LinkedIn Connect"},
    {day:7, action:"Follow-Up Email", template:"Follow-Up"},
    {day:14, action:"Thank You Email", template:"Thank You"}
  ];

  openModal(existing ? "Edit cadence" : "Create cadence", `
    <div class="fg"><label>Cadence Name</label><input id="cadenceNameInput" value="${esc(existing?.name || "")}" placeholder="Example: Standard Networking Cadence"></div>
    <div class="fg"><label>Description</label><textarea id="cadenceDescriptionInput" placeholder="What this cadence is used for">${esc(existing?.description || "")}</textarea></div>

    <h3 style="margin:16px 0 10px">Steps</h3>
    <div id="cadenceStepsEditor">
      ${steps.map((s, idx) => cadenceStepEditorRow(s, idx)).join("")}
    </div>

    <button class="btn-ghost" onclick="addCadenceStepRow()">Add Step</button>
  `, `
    <button class="btn-primary" onclick="saveCadenceTemplate('${existingId}')">Save Cadence</button>
  `);
}

function cadenceStepEditorRow(step, idx){
  return `
    <div class="card cadence-step-row" data-step-index="${idx}">

          <input class="cadence-step-day" type="number" min="0" value="${esc(step.day ?? 0)}">
        </div>
        <div class="fg">
          <label>Action</label>
          <select class="cadence-step-action">
            ${["Intro Email","LinkedIn Connect","Follow-Up Email","Thank You Email","Application Follow-Up","Custom"].map(a => `<option ${a===(step.action||"") ? "selected" : ""}>${a}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Template</label>
        <select class="cadence-step-template">
          ${state.templates.map(t => `<option ${t.name===(step.template||"") ? "selected" : ""}>${esc(t.name)}</option>`).join("")}
        </select>
      </div>
      <button class="btn-danger" onclick="this.closest('.cadence-step-row').remove()">Delete Step</button>
    </div>
  `;
}

function addCadenceStepRow(){
  const container = document.getElementById("cadenceStepsEditor");
  const idx = container.querySelectorAll(".cadence-step-row").length;
  container.insertAdjacentHTML("beforeend", cadenceStepEditorRow({day:0, action:"Custom", template:state.templates[0]?.name || ""}, idx));
}

function saveCadenceTemplate(existingId=""){
  const name = document.getElementById("cadenceNameInput").value.trim();
  const description = document.getElementById("cadenceDescriptionInput").value.trim();

  if(!name) return alert("Give the cadence a name.");

  const steps = [...document.querySelectorAll(".cadence-step-row")].map(row => ({
    day: Number(row.querySelector(".cadence-step-day").value || 0),
    action: row.querySelector(".cadence-step-action").value,
    template: row.querySelector(".cadence-step-template").value
  })).sort((a,b) => Number(a.day || 0) - Number(b.day || 0));

  if(!steps.length) return alert("Add at least one step.");

  if(existingId){
    const c = cadenceById(existingId);
    if(c){
      c.name = name;
      c.description = description;
      c.steps = steps;
    }
  } else {
    state.cadenceTemplates.push({
      id: id(),
      name,
      description,
      steps
    });
  }

  save();
  closeModal();
  render();
setTimeout(refreshStatusColors,0);
}

function editCadenceTemplate(id){
  openCadenceBuilder(id);
}

function deleteCadenceTemplate(id){
  const c = cadenceById(id);
  if(!c) return;

  if(!confirm(`Delete the cadence "${c.name}"? People assigned to it will be removed from this cadence.`)) return;

  state.cadenceTemplates = state.cadenceTemplates.filter(x => x.id !== id);
  state.people.forEach(p => {
    if(p.cadenceId === id){
      p.cadenceId = "";
      p.cadenceStartDate = "";
    }
  });

  save();
  render();
setTimeout(refreshStatusColors,0);
}

function removePersonFromCadence(personId){
  const p = state.people.find(x => x.id === personId);
  if(!p) return;
  p.cadenceId = "";
  p.cadenceStartDate = "";
  save();
  render();
setTimeout(refreshStatusColors,0);
}

function normalizeCompanyStatus(status){
  const s = String(status || "").trim();
  if(["Sent Emails","Sent email","Sent Email","Reached Out","Follow-Up Needed","Call Scheduled","Applied","Interviewing","Offer","Rejected"].includes(s)) return "Sent Emails";
  return "Researching Company";
}

function normalizePeopleStatus(status){
  const s = String(status || "").trim();
  const low = s.toLowerCase();
  if(["sent email","sent emails","emailed","reached out","contacted"].includes(low)) return "Sent email";
  if(["heard back","responded"].includes(low)) return "Heard back";
  if(["call scheduled","meeting scheduled","scheduled call"].includes(low)) return "Call scheduled";
  if(["have not heard back","no response","no reply"].includes(low)) return "Have not heard back";
  return "Have not sent email";
}

function normalizeAllStatuses(){
  state.companies.forEach(c => c.status = normalizeCompanyStatus(c.status));
  state.people.forEach(p => p.status = normalizePeopleStatus(p.status));
  save();
}
